[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
user=root

[program:gunicorn]
command=gunicorn core.wsgi:application
    --bind 0.0.0.0:8000
    --workers 2
    --worker-class sync
    --timeout 120
    --access-logfile -
    --error-logfile -
directory=/app
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="core.settings.production"

[program:celery-worker]
command=celery -A core worker --loglevel=info --concurrency=1 -E
directory=/app
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=30
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="core.settings.production"

[program:celery-beat]
command=celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
directory=/app
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=30
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="core.settings.production"